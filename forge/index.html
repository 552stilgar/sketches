<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>forge</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #15171c; --panel: #1c1f26; --line: #2b2f39;
  --ink: #c7ccd6; --mut: #7b818d; --stage-bg: #0b0d12;
}
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--ink);
  font-family: ui-sans-serif, system-ui, sans-serif;
  min-height: 100%; display: flex; flex-direction: column; align-items: center;
}
.mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
header { text-align: center; padding: 30px 20px 18px; user-select: none; }
.wordmark { font-size: clamp(34px, 6vw, 68px); font-weight: 700; letter-spacing: -0.02em; }
.sub { color: var(--mut); font-size: 13px; margin-top: 6px; }
.toolbar {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
  padding: 0 18px; margin-bottom: 16px;
}
.field {
  display: flex; background: var(--panel); border: 1px solid var(--line);
  border-radius: 7px; overflow: hidden;
}
.field input {
  background: transparent; border: 0; outline: none; color: var(--ink);
  font: 13px ui-monospace, Consolas, monospace; padding: 8px 12px; width: 200px;
}
button.btn {
  background: var(--panel); border: 1px solid var(--line); color: var(--ink);
  padding: 8px 14px; font: 600 13px ui-sans-serif, system-ui, sans-serif;
  border-radius: 7px; cursor: pointer; transition: border-color .12s, color .12s;
}
button.btn:hover { border-color: #4a505c; color: #fff; }
button.btn.on { border-color: #6b7280; color: #fff; }
.stage-wrap { display: flex; justify-content: center; width: 100%; padding: 0 18px; }
.stage {
  position: relative; border: 1px solid var(--line); border-radius: 12px;
  background: var(--stage-bg); box-shadow: 0 16px 48px rgba(0,0,0,.3);
  width: min(520px, 92vw); height: min(560px, 68vh); overflow: hidden;
}
#stage-canvas {
  width: 100%; height: 100%; display: block;
  cursor: grab; touch-action: none;
}
#stage-canvas:active { cursor: grabbing; }
#stage-hash {
  position: absolute; left: 12px; bottom: 10px; color: var(--mut); font-size: 12px;
  pointer-events: none;
  /* caption plate: the same framing strip the SVG cards use */
  background: rgba(8, 10, 16, 0.72); border: 1px solid rgba(120, 130, 150, 0.18);
  border-radius: 6px; padding: 4px 9px;
}
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px; width: min(920px, 94vw); margin: 26px 0 40px; padding: 0 18px;
}
.cell {
  background: var(--stage-bg); border: 1px solid var(--line); border-radius: 10px;
  padding: 8px 8px 6px; cursor: pointer; transition: border-color .12s;
}
.cell:hover { border-color: #4a505c; }
.cell.sel { border-color: #8a93a6; }
.cell canvas { width: 100%; display: block; border-radius: 6px; }
.cell .cap { color: var(--mut); font-size: 11px; text-align: center; padding-top: 6px; }

/* -- DNA editor panel — fixed overlay, never reflows the grid/stage -- */
.editor-panel {
  position: fixed; top: 0; right: 0; height: 100%; width: min(340px, 92vw);
  background: var(--panel); border-left: 1px solid var(--line);
  box-shadow: -16px 0 48px rgba(0,0,0,.35);
  transform: translateX(100%); transition: transform .18s ease;
  z-index: 40; display: flex; flex-direction: column;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
.editor-panel.open { transform: translateX(0); }
.editor-panel .ep-head {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 14px 14px; border-bottom: 1px solid var(--line);
  font-size: 12px; font-weight: 700; letter-spacing: .04em; color: var(--ink);
}
.editor-panel .ep-body { flex: 1; overflow-y: auto; padding: 4px 0 12px; }
.ep-section { border-bottom: 1px solid var(--line); }
.ep-section-head {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 9px 14px; cursor: pointer; color: var(--mut); user-select: none;
  font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
}
.ep-section-head:hover { color: var(--ink); }
.ep-section-body { padding: 2px 14px 10px; display: flex; flex-direction: column; gap: 10px; }
.ep-section.collapsed .ep-section-body { display: none; }
.ep-gene { display: flex; flex-direction: column; gap: 3px; border-radius: 6px; padding: 4px 6px; margin: 0 -6px; }
.ep-gene.overridden { background: rgba(215, 162, 74, 0.08); }
.ep-gene-row { display: flex; align-items: center; gap: 6px; }
.ep-gene-label {
  flex: 1; color: var(--ink); font-size: 11px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.ep-gene.overridden .ep-gene-label { color: #d7a24a; }
.ep-gene-val { color: var(--mut); font-size: 10px; min-width: 40px; text-align: right; }
.ep-gene input[type=range] { flex: 1; accent-color: #8a93a6; }
.ep-gene select {
  flex: 1; background: var(--stage-bg); color: var(--ink); border: 1px solid var(--line);
  border-radius: 5px; font: 11px ui-monospace, Consolas, monospace; padding: 3px 4px;
}
.ep-icon-btn {
  background: transparent; border: 1px solid var(--line); color: var(--mut);
  width: 22px; height: 22px; min-width: 22px; border-radius: 5px; cursor: pointer;
  font-size: 11px; line-height: 1; display: flex; align-items: center; justify-content: center;
  transition: border-color .12s, color .12s;
}
.ep-icon-btn:hover { border-color: #4a505c; color: #fff; }
.ep-icon-btn.locked { border-color: #d7a24a; color: #d7a24a; }
.ep-reset-btn {
  align-self: flex-start; background: none; border: none; color: #d7a24a; cursor: pointer;
  font-size: 10px; text-decoration: underline; padding: 0; font-family: inherit;
}
.editor-panel .ep-foot { padding: 10px 14px; border-top: 1px solid var(--line); }
.editor-panel .ep-foot button { width: 100%; }
</style>
</head>
<body>
<header>
  <div class="wordmark mono">forge</div>
  <div class="sub">seeded arms — every hash is a weapon</div>
</header>

<div class="toolbar">
  <div class="field">
    <input id="hash-input" class="mono" placeholder="hash or token…" spellcheck="false">
  </div>
  <button class="btn" id="btn-load">Load</button>
  <button class="btn" id="btn-random">⟳ Random</button>
  <button class="btn on" id="f-all">All</button>
  <button class="btn" id="f-sword">Swords</button>
  <button class="btn" id="f-axe">Axes</button>
  <button class="btn on" id="r-museum" title="1 — neutral studio, macro DoF">Museum</button>
  <button class="btn" id="r-loot" title="2 — warm rim, pedestal glow, bloom">Loot-card</button>
  <button class="btn" id="r-styl" title="3 — toon ramp + ink rim (preview pipeline)">Stylized</button>
  <button class="btn" id="btn-link">Copy Link</button>
  <button class="btn" id="btn-png">PNG</button>
  <button class="btn" id="btn-edit" title="Edit DNA gene-by-gene (e)">✎ Edit</button>
</div>

<div class="stage-wrap">
  <div class="stage">
    <canvas id="stage-canvas"></canvas>
    <div id="stage-hash" class="mono"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<aside class="editor-panel" id="editor-panel">
  <div class="ep-head">
    <span>DNA EDITOR</span>
    <button class="ep-icon-btn" id="ep-close" title="Close (e)" type="button">✕</button>
  </div>
  <div class="ep-body" id="ep-body"></div>
  <div class="ep-foot">
    <button class="btn" id="ep-reroll-unlocked" type="button">🎲 Reroll Unlocked</button>
  </div>
</aside>

<script type="module">
import {
  paramsFromHash, deriveLayout, deriveMaterial, randHex, hashToSeed, mulberry32,
  encodeToken, decodeToken, applyOverrides, clamp, DNA,
} from './params.mjs';
import {
  groupGenesBySection, rollGeneValue, rerollUnlocked,
} from './editor-logic.mjs';
import { resolveOrnament, packOrnamentUniforms } from './ornament.mjs';
import { applyFormat } from './format.mjs';
import { resolveHeadPlan, packHeadUniforms, HAFT_CURVE_TAME } from './axe-head.mjs';


const CFG = {
  gridCount: 12,
  maxStageRes: 900,     // native-res cap for the hero stage (v3: no pixelated upscale)
  thumbRes: 240,
  thumbAspect: 1.25,
  ptIdleMs: 250,        // camera stillness before the path tracer starts accumulating
  ptMaxSamples: 360,    // accumulation budget per view (mirrors the worker's CFG — both need this to size retry/progress loops)
};

// ---------------------------------------------------------------------------
// v11 (off-main-thread render): the entire GL engine (shaders, createRenderer,
// setScene) now lives in forge-render-worker.mjs, driving OffscreenCanvas
// instances on a dedicated thread — see that file's header for the message
// protocol and why. This proxy mirrors the old createRenderer()'s external
// shape (render/begin/stop/canPT) but every call is a postMessage round trip,
// which is the entire point: nothing here can block this thread, no matter
// how slow the real GPU compile/draw is on Usul's hardware.
//
// v11.1: one Worker PER canvas, not one shared worker. A worker is single-
// threaded — if a slow class's forced-sync compile fallback blocks it (the
// ornate axe took 100s+ under headless SwiftShader in testing), a SHARED
// worker would stall every OTHER pending render behind it too, including
// unrelated thumbnails and the interactive stage itself (confirmed: thumbs
// stuck head-of-line behind one slow axe cell even after the paced-queue
// fix). Separate workers mean the stage and the thumbnail strip can never
// block each other, no matter how slow one class's compile is.
// ---------------------------------------------------------------------------
function createWorkerStage(canvas, { progressive = false, mode = 'direct' } = {}) {
  const worker = new Worker('./forge-render-worker.mjs', { type: 'module' });
  const id = 'r'; // one renderer per worker now — the id just satisfies the shared protocol
  let reqSeq = 0;
  const pending = new Map(); // reqId -> {resolve, onProgress}
  let canPT = false;
  let liveBeginReqId = null; // the one 'begin' pending-entry that outlives its own reply — cleaned up on stop()
  let resolveInited;
  const inited = new Promise(resolve => { resolveInited = resolve; });

  worker.onmessage = (e) => {
    const msg = e.data;
    if (msg.cmd === 'inited') {
      canPT = msg.canPT;
      resolveInited();
    } else if (msg.cmd === 'render-result' || msg.cmd === 'capture-result') {
      const p = pending.get(msg.reqId);
      if (p) { pending.delete(msg.reqId); p.resolve(msg); }
    } else if (msg.cmd === 'begin-result') {
      // NOT deleted here — a real PT run's 'pt-progress' messages (same
      // reqId) keep arriving long after this "it started" confirmation;
      // the entry is only cleaned up by stop(), or a fresh begin() retiring it.
      const p = pending.get(msg.reqId);
      if (p) p.resolve(msg);
    } else if (msg.cmd === 'pt-progress') {
      const p = pending.get(msg.reqId);
      if (p && p.onProgress) p.onProgress(msg.n);
    } else if (msg.cmd === 'worker-error') {
      console.error('forge: render worker error (' + mode + ') —', msg.message);
      const p = msg.reqId != null ? pending.get(msg.reqId) : null;
      if (p) { pending.delete(msg.reqId); p.resolve({ status: 'failed' }); }
    }
  };
  worker.onerror = (e) => console.error('forge: render worker crashed (' + mode + ') —', e.message || e);

  const offscreen = canvas.transferControlToOffscreen();
  worker.postMessage({ cmd: 'init', id, canvas: offscreen, progressive, mode }, [offscreen]);

  function send(cmd, payload, opts) {
    return new Promise(resolve => {
      const reqId = ++reqSeq;
      pending.set(reqId, { resolve, onProgress: opts && opts.onProgress });
      worker.postMessage({ cmd, id, reqId, ...payload });
    });
  }

  return {
    inited,
    get canPT() { return canPT; },
    async render(params, pose, w, h, register) {
      return send('render', { params, pose, w, h, register }); // -> {status, bitmap?}
    },
    async begin(params, pose, w, h, register, onProgress) {
      if (liveBeginReqId != null) pending.delete(liveBeginReqId); // retire the previous run's entry
      const reqId = ++reqSeq;
      liveBeginReqId = reqId;
      const started = await new Promise(resolve => {
        pending.set(reqId, { resolve: (msg) => resolve(msg.started), onProgress });
        worker.postMessage({ cmd: 'begin', id, reqId, params, pose, w, h, register });
      });
      return started;
    },
    stop() {
      worker.postMessage({ cmd: 'stop', id });
      if (liveBeginReqId != null) { pending.delete(liveBeginReqId); liveBeginReqId = null; }
    },
    async capture() {
      const { blob } = await send('capture', {});
      return blob;
    },
  };
}

// ---------------------------------------------------------------------------
// App state + UI
// ---------------------------------------------------------------------------
const stageCanvas = document.getElementById('stage-canvas');
const stage = createWorkerStage(stageCanvas, { progressive: true, mode: 'direct' });
const thumbGL = createWorkerStage(document.createElement('canvas'), { progressive: false, mode: 'bitmap' });

const state = {
  token: null, params: null,
  baseHash: null, baseParams: null,   // un-edited roll — diffed for override highlighting + share tokens
  pose: { yaw: 0.55, pitch: 0.08, zoom: 1.0 },
  filter: 'all',
  register: 0,        // v5 presentation register: 0 museum, 1 loot-card, 2 stylized
  gridTokens: [],
  editorOpen: false,
  locked: new Set(),      // gene keys excluded from "reroll unlocked" — resets on a new base weapon
  collapsed: new Set(),   // collapsed editor section names
};

function paramsFromToken(token) {
  const { baseHash, overrides } = decodeToken(token);
  return applyOverrides(paramsFromHash(baseHash), overrides);
}

// slice 8: still mode (?still=WxH&spp=N) hands the stage to a one-shot
// path-traced render for card.html's rendered mode — normal stage flow is off
const STILL_SPEC = new URLSearchParams(location.search).get('still');

let idleTimer = 0, previewRetry = 0;
// v11: async now — every render() call is a postMessage round trip to the
// worker, which is the whole point (see the WorkerStageProxy comment above).
async function renderStage() {
  if (STILL_SPEC) return; // still mode owns the canvas
  clearTimeout(previewRetry);
  const rect = stageCanvas.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.min(Math.round(rect.width * dpr) || CFG.maxStageRes, CFG.maxStageRes);
  const h = Math.round(w * rect.height / Math.max(rect.width, 1));
  const cap = '#' + state.token + ' · ' + state.params.weapon_class + ' · ' +
    (state.params.weapon_class === 'sword' ? state.params.blade_type : state.params.head_type);
  const capEl = document.getElementById('stage-hash');
  // v10/v11: the first compile of a weapon class's preview shader can take
  // real time on some drivers (10-60s reported on real ANGLE-d3d11 hardware)
  // — background-compiled in the worker (never blocks this thread at all
  // now), so render() reports its status instead of a value to wait on.
  // Poll without freezing the tab; draw once ready. 'failed' (a real link
  // error, capped after the async-wait guard) is terminal — never retry
  // that state, or it loops forever showing "compiling..." for something
  // that will never compile.
  const { status } = await stage.render(state.params, state.pose, w, h, state.register);
  if (status === 'failed') {
    capEl.textContent = cap + ' · ⚠ shader failed to compile — see console; try reloading or --use-angle=gl';
    return;
  }
  if (status !== true) {
    capEl.textContent = cap + ' · compiling shader…';
    previewRetry = setTimeout(renderStage, 200);
    return;
  }
  capEl.textContent = cap;
  // camera at rest -> hand the stage to the path tracer.
  // stylized register stays on the preview pipeline — toon shading is not a
  // light-transport problem, and PT jitter would soften the ink lines.
  clearTimeout(idleTimer);
  if (state.register === 2) return;
  idleTimer = setTimeout(() => {
    stage.begin(state.params, state.pose, w, h, state.register, n => {
      if (n % 30 === 0 || n === CFG.ptMaxSamples) capEl.textContent = cap + ' · ✦ ' + n + ' spp';
    });
  }, CFG.ptIdleMs);
}

// v5: re-render existing thumbnails in place (register switch — same tokens);
// paced through the same chain as boot (freeze fix)
function repaintGrid() {
  paintThumbsPaced();
}

const REGISTERS = ['r-museum', 'r-loot', 'r-styl'];
function setRegister(i) {
  if (i === state.register) return;
  state.register = i;
  REGISTERS.forEach((id, k) =>
    document.getElementById(id).classList.toggle('on', k === i));
  stage.stop();
  renderStage();
  repaintGrid();
}
REGISTERS.forEach((id, i) =>
  document.getElementById(id).addEventListener('click', () => setRegister(i)));
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key >= '1' && e.key <= '3') setRegister(+e.key - 1);
});

function select(token, { fromGrid = false } = {}) {
  const { baseHash, overrides } = decodeToken(token);
  const newWeapon = baseHash !== state.baseHash;
  state.token = token;
  state.baseHash = baseHash;
  state.baseParams = paramsFromHash(baseHash);
  state.params = applyOverrides(state.baseParams, overrides);
  if (newWeapon) state.locked = new Set();   // locks are scoped to the weapon being edited
  // per-class hero pose: axes need a more frontal, slightly higher angle or
  // the head foreshortens into a "T"; swords read best at the classic 3/4.
  state.pose = state.params.weapon_class === 'axe'
    ? { yaw: 0.30, pitch: 0.14, zoom: 1.0 }
    : { yaw: 0.55, pitch: 0.08, zoom: 1.0 };
  history.replaceState(null, '', '#' + token);
  document.getElementById('hash-input').value = token;
  renderStage();
  if (state.editorOpen) buildEditorPanel();
  document.querySelectorAll('.cell').forEach(c => c.classList.toggle('sel', c.dataset.token === token));
  if (!fromGrid && !state.gridTokens.includes(token)) rebuildGrid(token);
}

function randomHashFor(filter) {
  for (let i = 0; i < 200; i++) {
    const hh = randHex(8);
    if (filter === 'all' || paramsFromHash(hh).weapon_class === filter) return hh;
  }
  return randHex(8);
}

function rebuildGrid(firstToken = null) {
  state.gridTokens = [];
  if (firstToken) state.gridTokens.push(firstToken);
  while (state.gridTokens.length < CFG.gridCount) state.gridTokens.push(randomHashFor(state.filter));

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const tw = CFG.thumbRes, thh = Math.round(CFG.thumbRes * CFG.thumbAspect);
  for (const token of state.gridTokens) {
    const cell = document.createElement('div');
    cell.className = 'cell' + (token === state.token ? ' sel' : '');
    cell.dataset.token = token;
    const cv = document.createElement('canvas');
    cv.width = tw; cv.height = thh;
    const cap = document.createElement('div');
    cap.className = 'cap mono';
    cap.textContent = '#' + token;
    cell.append(cv, cap);
    cell.addEventListener('click', () => select(token, { fromGrid: true }));
    grid.appendChild(cell);
  }
  paintThumbsPaced();
}

// slice 8 freeze fix: the grid used to render 12 heavy previews SYNCHRONOUSLY
// at boot — a GPU burst big enough to trip the Windows watchdog on real
// drivers (the "freezes on open" report). Thumbs now paint one per timeout
// tick; a rebuild mid-chain aborts the stale chain via the generation stamp.
let thumbGen = 0;
function paintThumbsPaced() {
  const gen = ++thumbGen;
  if (STILL_SPEC) return; // still mode never needs thumbs
  const cells = [...document.querySelectorAll('#grid .cell')];
  const tw = CFG.thumbRes, thh = Math.round(CFG.thumbRes * CFG.thumbAspect);
  // v11: thumbGL is 'bitmap' mode — the worker sends back a transferable
  // ImageBitmap after a successful draw. A queue, not a plain index: a
  // class's first compile can report 'pending', and an earlier version of
  // this retried the SAME cell in place, which head-of-line-blocked every
  // cell behind it if that class happened to be slow (the ornate axe can
  // take a long time on a weak GPU). Push a 'pending' cell to the BACK of
  // the queue instead — other cells (including same-class ones, once the
  // shared worker-side cache lands) get painted while it waits its turn.
  let queue = cells.map((_, idx) => idx);
  const paintOne = async (idx) => {
    if (gen !== thumbGen) return;
    const cell = cells[idx];
    const { status, bitmap } = await thumbGL.render(
      paramsFromToken(cell.dataset.token), { yaw: 0.55, pitch: 0.06, zoom: 1.0 }, tw, thh, state.register);
    if (gen !== thumbGen) return; // grid was rebuilt mid-await — drop this result
    if (status === true && bitmap) {
      cell.querySelector('canvas').getContext('2d').drawImage(bitmap, 0, 0);
      bitmap.close();
    } else if (status === 'failed') {
      console.error('forge: thumbnail render failed for', cell.dataset.token);
    } else {
      queue.push(idx); // still compiling — try again after the rest of the round
    }
  };
  const step = async () => {
    if (gen !== thumbGen || queue.length === 0) return;
    await paintOne(queue.shift());
    setTimeout(step, 40);
  };
  setTimeout(step, 60);
}

// -- stage interaction --
let drag = null, dragRAF = 0;
stageCanvas.addEventListener('pointerdown', e => {
  drag = { x: e.clientX, y: e.clientY, yaw: state.pose.yaw, pitch: state.pose.pitch };
  stageCanvas.setPointerCapture(e.pointerId);
});
stageCanvas.addEventListener('pointermove', e => {
  if (!drag) return;
  state.pose.yaw = drag.yaw + (e.clientX - drag.x) * 0.011;
  state.pose.pitch = clamp(drag.pitch + (e.clientY - drag.y) * 0.009, -1.35, 1.35);
  // v10: pointermove can fire far faster than a render can complete on real
  // hardware — coalesce to at most one renderStage() per animation frame
  // instead of one per raw event (Usul's reported drag stutter).
  if (!dragRAF) dragRAF = requestAnimationFrame(() => { dragRAF = 0; renderStage(); });
});
stageCanvas.addEventListener('pointerup', () => { drag = null; });
stageCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  state.pose.zoom = clamp(state.pose.zoom * (e.deltaY > 0 ? 1.09 : 0.92), 0.45, 2.6);
  renderStage();
}, { passive: false });

// -- toolbar --
document.getElementById('btn-random').addEventListener('click', () => {
  state.filter === 'all' ? rebuildGrid() : rebuildGrid();
  select(state.gridTokens[0], { fromGrid: true });
});
document.getElementById('btn-load').addEventListener('click', () => {
  const v = document.getElementById('hash-input').value.trim().replace(/^#/, '');
  if (v) select(v);
});
document.getElementById('hash-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-load').click();
});
for (const [id, val] of [['f-all', 'all'], ['f-sword', 'sword'], ['f-axe', 'axe']]) {
  document.getElementById(id).addEventListener('click', () => {
    state.filter = val;
    for (const other of ['f-all', 'f-sword', 'f-axe']) {
      document.getElementById(other).classList.toggle('on', other === id);
    }
    rebuildGrid();
    select(state.gridTokens[0], { fromGrid: true });
  });
}
document.getElementById('btn-link').addEventListener('click', async () => {
  await navigator.clipboard.writeText(location.href.split('#')[0] + '#' + state.token);
  const b = document.getElementById('btn-link');
  b.textContent = 'Copied ✓'; setTimeout(() => { b.textContent = 'Copy Link'; }, 1200);
});
document.getElementById('btn-png').addEventListener('click', () => {
  // no re-render: the canvas holds the accumulated beauty frame if one resolved
  const a = document.createElement('a');
  a.download = 'forge-' + state.token.slice(0, 12) + '.png';
  a.href = stageCanvas.toDataURL('image/png');
  a.click();
});

// ---------------------------------------------------------------------------
// DNA editor panel — built 100% off DNA metadata (editor-logic.mjs), so a
// future appended gene shows up with zero changes here. Panel structure is
// rebuilt on open / weapon-class change / reroll-unlocked (visible-gene set
// or many values change); individual edits patch just that gene's row so
// active slider drags never get their DOM element replaced mid-gesture.
// ---------------------------------------------------------------------------
const geneEls = new Map(); // DNA index -> { root, control, valueEl, resetBtn, lockBtn }

function keyLabel(key) { return key.replace(/_/g, ' '); }

function setGeneValue(index, domainValue) {
  const spec = DNA[index];
  const classChanging = spec.key === 'weapon_class' && domainValue !== state.params.weapon_class;
  state.params = { ...state.params, [spec.key]: domainValue };
  state.token = encodeToken(state.baseHash, state.params, state.baseParams);
  history.replaceState(null, '', '#' + state.token);
  document.getElementById('hash-input').value = state.token;
  renderStage();
  // weapon_class changing swaps which sections/genes are visible -> full rebuild;
  // everything else patches its own row in place.
  if (classChanging) buildEditorPanel(); else syncGeneRow(index);
}

function syncGeneRow(index) {
  const els = geneEls.get(index);
  if (!els) return;
  const spec = DNA[index];
  const val = state.params[spec.key];
  if (spec.options) {
    els.control.value = String(val);
    els.valueEl.textContent = String(val);
  } else {
    els.control.value = val;
    els.valueEl.textContent = Number(val).toFixed(spec.decimals ?? 3);
  }
  const overridden = !!state.baseParams && val !== state.baseParams[spec.key];
  els.root.classList.toggle('overridden', overridden);
  els.resetBtn.style.display = overridden ? '' : 'none';
  els.lockBtn.classList.toggle('locked', state.locked.has(spec.key));
  els.lockBtn.textContent = state.locked.has(spec.key) ? '🔒' : '🔓';
}

function buildGeneRow(index) {
  const spec = DNA[index];
  const root = document.createElement('div');
  root.className = 'ep-gene';

  const row = document.createElement('div');
  row.className = 'ep-gene-row';
  const label = document.createElement('span');
  label.className = 'ep-gene-label';
  label.textContent = keyLabel(spec.key);
  label.title = spec.key;
  const lockBtn = document.createElement('button');
  lockBtn.className = 'ep-icon-btn'; lockBtn.type = 'button'; lockBtn.title = 'Lock gene';
  const rerollBtn = document.createElement('button');
  rerollBtn.className = 'ep-icon-btn'; rerollBtn.type = 'button'; rerollBtn.title = 'Reroll gene';
  rerollBtn.textContent = '🎲';
  row.append(label, lockBtn, rerollBtn);

  const ctrlRow = document.createElement('div');
  ctrlRow.className = 'ep-gene-row';
  const valueEl = document.createElement('span');
  valueEl.className = 'ep-gene-val';

  let control;
  if (spec.options) {
    control = document.createElement('select');
    for (const opt of [...new Set(spec.options)]) {
      const o = document.createElement('option');
      o.value = String(opt);
      o.textContent = String(opt);
      control.appendChild(o);
    }
    control.addEventListener('change', () => {
      const raw = control.value;
      const isNumeric = typeof spec.options[0] === 'number';
      setGeneValue(index, isNumeric ? Number(raw) : raw);
    });
  } else {
    control = document.createElement('input');
    control.type = 'range';
    control.min = spec.min; control.max = spec.max;
    const f = 10 ** (spec.decimals ?? 3);
    control.step = 1 / f;
    control.addEventListener('input', () => {
      const rounded = Math.round(parseFloat(control.value) * f) / f;
      setGeneValue(index, rounded);
    });
  }
  ctrlRow.append(control, valueEl);

  const resetBtn = document.createElement('button');
  resetBtn.className = 'ep-reset-btn'; resetBtn.type = 'button'; resetBtn.textContent = 'reset';
  resetBtn.addEventListener('click', () => setGeneValue(index, state.baseParams[spec.key]));

  lockBtn.addEventListener('click', () => {
    if (state.locked.has(spec.key)) state.locked.delete(spec.key);
    else state.locked.add(spec.key);
    syncGeneRow(index);
  });
  rerollBtn.addEventListener('click', () => setGeneValue(index, rollGeneValue(spec, Math.random)));

  root.append(row, ctrlRow, resetBtn);
  geneEls.set(index, { root, control, valueEl, resetBtn, lockBtn });
  syncGeneRow(index);
  return root;
}

function buildEditorPanel() {
  geneEls.clear();
  const body = document.getElementById('ep-body');
  body.innerHTML = '';
  for (const { section, indices } of groupGenesBySection(state.params.weapon_class)) {
    if (!indices.length) continue;
    const sec = document.createElement('div');
    sec.className = 'ep-section' + (state.collapsed.has(section) ? ' collapsed' : '');
    const head = document.createElement('div');
    head.className = 'ep-section-head';
    const caret = document.createElement('span');
    caret.textContent = state.collapsed.has(section) ? '▸' : '▾';
    const title = document.createElement('span');
    title.textContent = section;
    head.append(title, caret);
    head.addEventListener('click', () => {
      if (state.collapsed.has(section)) state.collapsed.delete(section);
      else state.collapsed.add(section);
      sec.classList.toggle('collapsed');
      caret.textContent = state.collapsed.has(section) ? '▸' : '▾';
    });
    const secBody = document.createElement('div');
    secBody.className = 'ep-section-body';
    for (const i of indices) secBody.appendChild(buildGeneRow(i));
    sec.append(head, secBody);
    body.appendChild(sec);
  }
}

function setEditorOpen(open) {
  state.editorOpen = open;
  document.getElementById('editor-panel').classList.toggle('open', open);
  document.getElementById('btn-edit').classList.toggle('on', open);
  if (open) buildEditorPanel();
}
document.getElementById('btn-edit').addEventListener('click', () => setEditorOpen(!state.editorOpen));
document.getElementById('ep-close').addEventListener('click', () => setEditorOpen(false));
document.getElementById('ep-reroll-unlocked').addEventListener('click', () => {
  state.params = rerollUnlocked(state.params, state.locked, Math.random);
  state.token = encodeToken(state.baseHash, state.params, state.baseParams);
  history.replaceState(null, '', '#' + state.token);
  document.getElementById('hash-input').value = state.token;
  renderStage();
  buildEditorPanel();   // reroll can touch every gene incl. weapon_class -> full rebuild
});
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'e' || e.key === 'E') setEditorOpen(!state.editorOpen);
});

window.addEventListener('resize', renderStage);
window.addEventListener('hashchange', () => {
  const t = location.hash.replace(/^#/, '');
  if (t && t !== state.token) select(t);
});

// -- boot --
const boot = location.hash.replace(/^#/, '') || randHex(8);
rebuildGrid(boot);
select(boot, { fromGrid: true });

// -- still mode (slice 8): one path-traced still of the current token, handed
// to the embedding page (card.html rendered mode — the D2 pre-render pipeline).
// Result lands in window.__forgeStill AND a postMessage to the parent frame.
// Fallback to the preview rasteriser is DISCLOSED via mode: 'preview'.
// still presentation pose; zoom backed off so the weapon fits the portrait.


const STILL_POSE = { yaw: 0.22, pitch: 0.06, zoom: 1.32 }; // yaw 0.22 = blade screen-RIGHT like the card (verified by preview yaw sweep)
function stillPose() {
  const raw = new URLSearchParams(location.search).get('pose');
  if (!raw) return STILL_POSE;
  const [y, p, z] = raw.split(',').map(Number);
  return {
    yaw: Number.isFinite(y) ? y : STILL_POSE.yaw,
    pitch: Number.isFinite(p) ? p : STILL_POSE.pitch,
    zoom: Number.isFinite(z) ? z : STILL_POSE.zoom,
  };
}
const STILL_WATCHDOG_MS = 75000; // smaller PT tiles stretch a 220spp still to ~1min on mid GPUs
if (STILL_SPEC) runStill(STILL_SPEC);

function blobToDataURL(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function runStill(spec) {
  clearTimeout(idleTimer); // select() queued a stage PT — still mode owns the canvas
  // low-visibility iframes get their rAF throttled (this starved the card's
  // render into its timeout) — pace the still on timeouts instead; the fence
  // gating keeps the GPU queue shallow either way
  if (window.parent !== window) {
    window.requestAnimationFrame = cb => setTimeout(() => cb(performance.now()), 4);
    window.cancelAnimationFrame = id => clearTimeout(id);
  }
  // strip the page down to the bare canvas: a viewport screenshot of a still
  // page IS the render (headless GPU capture path — pc-render style)
  for (const el of document.body.children) el.style.display = 'none';
  document.body.appendChild(stageCanvas);
  document.body.style.background = '#000';
  stageCanvas.style.cssText = 'display:block;position:fixed;inset:0;width:100vw;height:100vh;';
  const m = /^(\d+)x(\d+)$/.exec(spec);
  const w = m ? +m[1] : 440, h = m ? +m[2] : 660;
  const sppReq = +(new URLSearchParams(location.search).get('spp')) || 200;
  const spp = Math.max(4, Math.min(sppReq, CFG.ptMaxSamples));
  const POSE = stillPose();
  const t0 = performance.now();
  let done = false;
  // v11: capture goes through the worker (convertToBlob — OffscreenCanvas
  // has no toDataURL) and gets converted back to a dataURL here, so the
  // external wire contract to card.html (payload.dataURL) is unchanged.
  const finish = async (mode, sppDone) => {
    if (done) return;
    done = true;
    stage.stop();
    const blob = await stage.capture();
    const dataURL = await blobToDataURL(blob);
    const payload = { type: 'forge-still', token: state.token, mode, spp: sppDone,
      elapsedMs: Math.round(performance.now() - t0), dataURL };
    window.__forgeStill = payload;
    document.title = `still:${payload.mode}:${payload.spp}:${payload.elapsedMs}`; // DOM-visible status for headless probes (--dump-dom)
    if (window.parent !== window) window.parent.postMessage(payload, '*');
  };
  // v10/v11: render() is a background-compiled first draw per class now
  // (status: true / 'pending' / 'failed', never blocking) — wait for it
  // instead of assuming the canvas is already painted, or a slow first
  // compile would ship a blank "preview". 'pending' is capped (v11's
  // async-wait guard) on the worker side, so this can never spin forever;
  // 'failed' proceeds anyway (nothing left to wait for) — the still-mode
  // watchdog below is the hard backstop either way.
  const renderUntilReady = async () => {
    while (!done) {
      const { status } = await stage.render(state.params, POSE, w, h, state.register);
      if (status !== 'pending') return status;
      await new Promise(r => setTimeout(r, 100));
    }
    return 'aborted';
  };
  stage.stop();
  renderUntilReady().then(() => {
    if (done) return;
    // &mode=preview: explicit single-pass raster still (instant; used by the
    // headless harness to verify framing/post without PT convergence time)
    const wantPreview = new URLSearchParams(location.search).get('mode') === 'preview';
    if (wantPreview || !stage.canPT) { setTimeout(() => finish('preview', 0), 300); return; } // 300ms: banded preview finishes across a few rAFs
    let lastN = 0;
    stage.begin(state.params, POSE, w, h, state.register, n => {
      lastN = n;
      document.title = `still:progress:${n}:${Math.round(performance.now() - t0)}`;
      // live telemetry so the card can show progress + the loop can be tuned
      if (n === 1 || n % 10 === 0) {
        if (window.parent !== window) window.parent.postMessage({
          type: 'forge-still-progress', token: state.token, spp: n, target: spp,
          elapsedMs: Math.round(performance.now() - t0),
        }, '*');
      }
      if (n >= spp) finish('pt', n);
    });
    // watchdog: slow accumulation ships the partial render (still a real PT
    // image, spp disclosed); a PT that never produced a sample falls back to
    // the preview rasteriser — disclosed, never silent
    setTimeout(async () => {
      if (done) return;
      if (lastN > 0) { finish('pt', lastN); return; }
      stage.stop();
      await renderUntilReady();
      finish('preview', 0);
    }, STILL_WATCHDOG_MS);
  });
}
</script>
