<!doctype html><html><head><meta charset="utf-8"></head><body>
<canvas id="c" width="64" height="64"></canvas>
<script>
document.title = 'minitest:start';
try {
  const gl = document.getElementById('c').getContext('webgl2', { antialias: false });
  if (!gl) throw new Error('no webgl2');
  gl.getExtension('EXT_color_buffer_float');
  const vsrc = 'void main(){gl_Position=vec4(0.0,0.0,0.0,1.0);}';
  // unrelated-to-our-SDF but iteration-heavy shader: 3 nested loops totalling
  // roughly the same order of magnitude of unrolled work as the real PT
  // (110 steps x 3 bounces + 40-step shadow x 3 = ~480 inlined evaluations),
  // each iteration doing a modest amount of arithmetic (no branching tree).
  const fsrc = '#version 300 es\n' +
    'precision highp float;\n' +
    'out vec4 o;\n' +
    'float heavy(vec3 p) {\n' +
    '  float a = 0.0;\n' +
    '  for (int i = 0; i < 110; i++) { a += sin(p.x * float(i) + p.y) * cos(p.z - float(i)); p += vec3(0.01, 0.02, 0.03); }\n' +
    '  return a;\n' +
    '}\n' +
    'void main() {\n' +
    '  vec3 p = vec3(0.1, 0.2, 0.3);\n' +
    '  float s = 0.0;\n' +
    '  for (int b = 0; b < 3; b++) {\n' +
    '    s += heavy(p);\n' +
    '    for (int i = 0; i < 40; i++) { s += sqrt(abs(sin(float(i) + s))); }\n' +
    '    p += vec3(s * 0.001);\n' +
    '  }\n' +
    '  o = vec4(fract(s), 0.0, 0.0, 1.0);\n' +
    '}\n';
  const vs = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(vs, vsrc); gl.compileShader(vs);
  const fs = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(fs, fsrc); gl.compileShader(fs);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  const ok = gl.getProgramParameter(prog, gl.LINK_STATUS);
  document.title = 'minitest:loopy:' + (ok ? 'linked' : 'FAILED:' + gl.getProgramInfoLog(prog));
} catch (e) {
  document.title = 'minitest:loopy:ERROR:' + e.message;
}
</script>
</body></html>
